<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkçede Ek Fiiller 🌟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0c29;--card:#1e1b4b;--card2:#252060;--a1:#f59e0b;--a2:#ec4899;--a3:#06b6d4;--a4:#10b981;--tx:#f0e6ff;--tx2:#c4b5fd;--ok:#10b981;--no:#ef4444;--br:rgba(167,139,250,.22);--sh:0 8px 32px rgba(0,0,0,.5)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 50%,rgba(139,92,246,.14) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(236,72,153,.09) 0%,transparent 50%)}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) ease-in-out infinite alternate}
@keyframes twinkle{from{opacity:.1;transform:scale(1)}to{opacity:.7;transform:scale(1.3)}}
.app{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:20px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1}
.login-box{background:var(--card);border:1px solid var(--br);border-radius:28px;padding:38px 34px;max-width:420px;width:100%;box-shadow:var(--sh);position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--a1),var(--a2),var(--a3))}
.game-logo{font-family:'Baloo 2',cursive;font-size:1.9rem;font-weight:800;text-align:center;background:linear-gradient(135deg,#f59e0b,#ec4899,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:5px}
.login-sub{text-align:center;color:var(--tx2);font-size:.88rem;margin-bottom:26px}
.author-sig{text-align:center;margin-top:20px;padding-top:15px;border-top:1px solid rgba(167,139,250,.2)}
.author-name{font-size:.84rem;font-weight:800;color:rgba(196,181,253,.72);letter-spacing:.04em}
.author-dot{font-size:.84rem;color:rgba(196,181,253,.4);margin:0 3px}
.author-title{font-size:.8rem;font-weight:600;color:rgba(196,181,253,.55);letter-spacing:.03em}
.footer-author{text-align:center;padding:16px 0 10px;font-size:.75rem;color:rgba(196,181,253,.45);letter-spacing:.06em;font-weight:700;position:relative;z-index:1}
label{font-size:.87rem;font-weight:700;color:var(--tx2);display:block;margin-bottom:7px}
.inp{width:100%;background:rgba(255,255,255,.07);border:2px solid var(--br);border-radius:14px;padding:13px 17px;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:700;color:var(--tx);outline:none;transition:border-color .3s}
.inp:focus{border-color:var(--a3)}
.inp.err{border-color:var(--no)}
.err-msg{color:#fca5a5;font-size:.82rem;font-weight:700;margin-top:6px;min-height:18px}
.login-btn{width:100%;margin-top:16px;font-family:'Baloo 2',cursive;font-size:1.1rem;font-weight:800;padding:13px;border-radius:14px;border:none;cursor:pointer;background:linear-gradient(135deg,var(--a1),#f97316);color:#fff;transition:all .25s}
.login-btn:hover{transform:translateY(-2px)}
.lb-preview{margin-top:22px}
.lb-preview-title{font-size:.82rem;font-weight:800;color:var(--tx2);text-align:center;margin-bottom:9px;text-transform:uppercase;letter-spacing:.05em}
.lb-row{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:10px;background:var(--card2);margin-bottom:5px;font-size:.87rem;font-weight:700}
.lb-row .lbr{width:22px;text-align:center}.lb-row .lbn{flex:1}.lb-row .lbp{color:var(--a1)}
.hdr{text-align:center;padding:24px 20px 14px}
.hdr h1{font-family:'Baloo 2',cursive;font-size:clamp(1.5rem,5vw,2.3rem);font-weight:800;background:linear-gradient(135deg,#f59e0b,#ec4899,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:4px}
.hdr .sub{color:var(--tx2);font-size:.88rem;font-weight:600}
.player-chip{display:inline-flex;align-items:center;gap:7px;margin-top:7px;background:var(--card2);border:1px solid var(--br);border-radius:50px;padding:5px 14px;font-size:.87rem;font-weight:700;color:var(--a3)}
.score-bar{display:flex;justify-content:center;gap:10px;margin:8px 0 14px;flex-wrap:wrap}
.chip{background:var(--card2);border:1px solid var(--br);border-radius:50px;padding:5px 14px;font-size:.85rem;font-weight:700;display:flex;align-items:center;gap:5px}
.chip.c{border-color:var(--ok);color:var(--ok)}.chip.w{border-color:var(--no);color:var(--no)}.chip.p{border-color:var(--a1);color:var(--a1)}
.nav{display:flex;gap:7px;justify-content:center;margin-bottom:22px;flex-wrap:wrap}
.nav-btn{font-family:'Baloo 2',cursive;font-size:.83rem;font-weight:700;padding:7px 15px;border-radius:50px;border:2px solid var(--br);background:var(--card);color:var(--tx2);cursor:pointer;transition:all .3s;position:relative}
.nav-btn:hover:not(.locked){border-color:var(--a1);color:var(--a1);transform:translateY(-2px)}
.nav-btn.active{background:linear-gradient(135deg,var(--a1),var(--a2));border-color:transparent;color:#fff;box-shadow:0 4px 18px rgba(245,158,11,.4);transform:translateY(-2px)}
.nav-btn.locked{opacity:.3;cursor:not-allowed}
.nav-btn.done{border-color:var(--ok);color:var(--ok)}
.nav-btn.done::after{content:'✓';position:absolute;top:-6px;right:-6px;background:var(--ok);color:#fff;border-radius:50%;width:17px;height:17px;font-size:.68rem;display:flex;align-items:center;justify-content:center;font-weight:900}
.card{background:var(--card);border:1px solid var(--br);border-radius:22px;padding:26px;box-shadow:var(--sh);animation:fadeUp .45s ease;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--a1),var(--a2),var(--a3))}
.sec-title{font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:700;margin-bottom:5px;color:var(--a1)}
.sec-desc{font-size:.87rem;color:var(--tx2);margin-bottom:18px;line-height:1.5}
.prog-wrap{background:rgba(255,255,255,.1);border-radius:50px;height:7px;margin-bottom:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--a1),var(--a2));transition:width .5s ease}
.prog-lbl{font-size:.8rem;color:var(--tx2);text-align:right;margin:3px 0 14px;font-weight:700}
.qbox{background:var(--card2);border-radius:14px;padding:18px 22px;margin-bottom:14px;border:1px solid var(--br);position:relative}
.qnum{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--a2);margin-bottom:7px}
.qtxt{font-size:.98rem;font-weight:600;line-height:1.7}
.qhi{color:var(--a1);font-weight:800}
.qtag{display:inline-block;background:rgba(6,182,212,.13);border:1px solid rgba(6,182,212,.38);color:var(--a3);border-radius:7px;padding:2px 9px;font-size:.8rem;font-weight:700;margin:4px 2px}
.pt-badge{position:absolute;top:11px;right:13px;background:rgba(245,158,11,.13);border:1px solid rgba(245,158,11,.38);border-radius:7px;padding:2px 9px;font-size:.76rem;font-weight:800;color:var(--a1)}
.ans-row{display:flex;gap:9px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.ans-inp{flex:1;min-width:180px;background:rgba(255,255,255,.06);border:2px solid var(--br);border-radius:11px;padding:11px 15px;font-family:'Nunito',sans-serif;font-size:1.03rem;font-weight:700;color:var(--tx);transition:border-color .3s;outline:none}
.ans-inp:focus{border-color:var(--a3)}
.ans-inp.ok{border-color:var(--ok);background:rgba(16,185,129,.1)}
.ans-inp.no{border-color:var(--no);background:rgba(239,68,68,.08)}
.btn{font-family:'Baloo 2',cursive;font-size:.95rem;font-weight:700;padding:11px 22px;border-radius:11px;border:none;cursor:pointer;transition:all .25s;display:inline-flex;align-items:center;gap:7px}
.btn-p{background:linear-gradient(135deg,var(--a1),#f97316);color:#fff;box-shadow:0 4px 14px rgba(245,158,11,.32)}
.btn-p:hover{transform:translateY(-2px)}
.btn-s{background:var(--card2);color:var(--tx2);border:1px solid var(--br)}
.btn-s:hover{border-color:var(--a3);color:var(--a3)}
.nxt-row{display:flex;justify-content:flex-end;margin-top:14px;gap:9px}
.fb{border-radius:12px;padding:12px 16px;margin-top:9px;font-weight:700;font-size:.92rem;display:none;align-items:flex-start;gap:9px;line-height:1.5}
.fb.show{display:flex}
.fb.ok{background:rgba(16,185,129,.13);border:2px solid var(--ok);color:#34d399}
.fb.no{background:rgba(239,68,68,.09);border:2px solid var(--no);color:#fca5a5}
.choices-2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:14px 0}
.ch{font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:700;padding:13px 15px;border-radius:13px;border:2px solid var(--br);background:var(--card2);color:var(--tx);cursor:pointer;transition:all .25s;text-align:center;line-height:1.4}
.ch:hover:not(:disabled){border-color:var(--a3);color:var(--a3);transform:translateY(-2px)}
.ch.ok{border-color:var(--ok)!important;background:rgba(16,185,129,.18)!important;color:#34d399!important}
.ch.no{border-color:var(--no)!important;background:rgba(239,68,68,.13)!important;color:#fca5a5!important}
.ch:disabled{cursor:default}
.txtdisplay{line-height:3;font-size:1rem;font-weight:600;background:var(--card2);border-radius:14px;padding:20px 22px;border:1px solid var(--br)}
.wc{cursor:pointer;border-radius:6px;padding:2px 4px;transition:background .15s,color .15s;display:inline}
.wc:hover{background:rgba(167,139,250,.22);color:#c4b5fd}
.wc.found{background:linear-gradient(135deg,var(--a4),#059669)!important;color:#fff!important;border-radius:7px;padding:2px 8px;animation:correctWord .4s cubic-bezier(.175,.885,.32,1.275)}
.wc.wrong-flash{background:rgba(239,68,68,.22)!important;color:var(--no)!important;animation:shake .35s ease}
@keyframes correctWord{0%{transform:scale(1)}50%{transform:scale(1.22)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.found-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(16,185,129,.18);border:1px solid var(--ok);border-radius:50px;padding:3px 11px;font-size:.8rem;color:#34d399;font-weight:700}
.complete{text-align:center;padding:32px 16px}
.cmpl-ico{font-size:3.6rem;margin-bottom:14px;animation:bounce 1s ease infinite alternate}
.cmpl-ttl{font-family:'Baloo 2',cursive;font-size:1.75rem;font-weight:800;background:linear-gradient(135deg,var(--a1),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:9px}
.final-score{font-size:3rem;font-weight:900;color:var(--a1);text-shadow:0 0 28px rgba(245,158,11,.55);margin:14px 0}
.brkdwn{background:var(--card2);border-radius:14px;padding:16px;margin:14px 0;text-align:left;border:1px solid var(--br)}
.brow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.88rem;font-weight:700}
.brow:last-child{border-bottom:none}
.brow span:first-child{color:var(--tx2)}.brow span:last-child{color:var(--a1)}
.mega{position:fixed;inset:0;pointer-events:none;z-index:500;display:flex;align-items:center;justify-content:center;animation:megaFlash .7s ease forwards}
@keyframes megaFlash{0%{background:rgba(16,185,129,0)}35%{background:rgba(16,185,129,.18)}100%{background:rgba(16,185,129,0)}}
.mega-txt{font-family:'Baloo 2',cursive;font-size:3.8rem;font-weight:900;color:#10b981;text-shadow:0 0 40px rgba(16,185,129,.85);animation:megaTxt .7s cubic-bezier(.175,.885,.32,1.275) forwards}
@keyframes megaTxt{0%{opacity:0;transform:scale(.5)}55%{opacity:1;transform:scale(1.22)}100%{opacity:0;transform:scale(1.55)}}
.starburst{position:fixed;pointer-events:none;font-size:1.5rem;animation:starFloat 1.2s ease-out forwards;z-index:600}
@keyframes starFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-90px) scale(1.6)}}
.conf{position:fixed;width:10px;height:10px;border-radius:2px;pointer-events:none;animation:confFall var(--cd,2s) ease-in forwards;z-index:9999}
@keyframes confFall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.lb-box{background:var(--card);border:1px solid var(--br);border-radius:22px;padding:28px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.65);max-height:80vh;overflow-y:auto}
.lb-ttl{font-family:'Baloo 2',cursive;font-size:1.45rem;font-weight:800;color:var(--a1);text-align:center;margin-bottom:18px}
.lb-entry{display:flex;align-items:center;gap:11px;padding:9px 13px;border-radius:11px;margin-bottom:7px;font-weight:700;border:1px solid var(--br);background:var(--card2)}
.lb-entry:first-child{background:linear-gradient(135deg,rgba(245,158,11,.28),rgba(245,158,11,.08));border-color:rgba(245,158,11,.4)}
.lb-num{width:30px;text-align:center}.lb-name{flex:1}.lb-pts{color:var(--a1)}
.lb-me{color:var(--a3)!important}.lb-me-badge{font-size:.68rem;background:var(--a3);color:#0f172a;border-radius:4px;padding:1px 5px;margin-left:5px}
.modal-box{background:var(--card);border:1px solid var(--br);border-radius:19px;padding:26px;max-width:460px;width:100%;box-shadow:0 20px 58px rgba(0,0,0,.65)}
.modal-ttl{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;color:var(--a1);margin-bottom:10px}
.modal-body{font-size:.88rem;color:var(--tx2);line-height:1.75;margin-bottom:18px}
.rep-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);border-radius:7px;color:var(--tx2);font-size:.76rem;font-weight:700;padding:3px 8px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:4px}
.rep-btn:hover{background:rgba(239,68,68,.13);border-color:var(--no);color:#fca5a5}
.fix-btn{position:fixed;width:46px;height:46px;border-radius:50%;border:none;color:#fff;font-size:1.2rem;cursor:pointer;z-index:10;transition:transform .25s;display:flex;align-items:center;justify-content:center}
.fix-btn:hover{transform:scale(1.12)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-11px)}}
@media(max-width:520px){.choices-2{grid-template-columns:1fr}}
</style>
</head>

// ---- ÖĞRENCİ LİSTESİ ----
// ---- ÖĞRENCİ LİSTESİ: { "NO": "AD SOYAD" } ----
// ---- ÖĞRENCİ LİSTESİ Firebase'den yüklenir ----
var OGRENCILER = null; // Firebase'den gelecek

function ogrencileriYukle(callback){
  firebase.database().ref('ogrenciler').once('value', function(snapshot){
    OGRENCILER = snapshot.val() || {};
    callback();
  }, function(hata){
    OGRENCILER = {};
    callback();
  });
}

function normalizeTR(s){
  return s.toUpperCase()
    .replace(/İ/g,"I").replace(/Ğ/g,"G").replace(/Ü/g,"U")
    .replace(/Ş/g,"S").replace(/Ö/g,"O").replace(/Ç/g,"C")
    .replace(/ı/g,"I").replace(/ğ/g,"G").replace(/ü/g,"U")
    .replace(/ş/g,"S").replace(/ö/g,"O").replace(/ç/g,"C")
    .replace(/i/g,"I");
}

function levenshtein(a,b){
  var m=a.length,n=b.length,dp=[];
  for(var i=0;i<=m;i++){dp[i]=[i];for(var j=1;j<=n;j++)dp[i][j]=0;}
  for(var j=0;j<=n;j++)dp[0][j]=j;
  for(var i=1;i<=m;i++)for(var j=1;j<=n;j++){
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  }
  return dp[m][n];
}

function isTurkce(name){
  return /^t[üu]rk[çc]e\s*\d+$/i.test(name.trim());
}

function startGame(){
  var inp=document.getElementById("nameInp"),err=document.getElementById("nameErr");
  var girdi=inp.value.trim();
  if(!girdi){err.textContent="Lütfen bilgilerinizi girin.";inp.classList.add("err");return;}
  if(hasBadWord(girdi)){err.textContent="Bu giriş kullanılamaz.";inp.classList.add("err");return;}

  // türkçe1..türkçe250 kontrolü
  if(isTurkce(girdi)){playerName=girdi;inp.classList.remove("err");err.textContent="";renderGameScreen();return;}

  // Liste henüz yüklenmediyse bekle
  if(!OGRENCILER){
    err.style.color="#fcd34d";
    err.textContent="Liste yükleniyor, lütfen bekleyin...";return;
  }

  // Format: NO AD SOYAD — ilk kelime numara olmalı
  var parcalar=girdi.split(/\s+/);
  if(parcalar.length<2){
    err.style.color="#fca5a5";
    err.textContent="Önce numara, sonra adınızı yazın. Örnek: 689 Uğur Yıldırım";
    inp.classList.add("err");return;
  }

  var no=parcalar[0];
  var girilenAd=parcalar.slice(1).join(" ");

  // Numara listede var mı?
  if(!OGRENCILER[no]){
    err.style.color="#fca5a5";
    err.textContent="Bu öğrenci numarası bulunamadı. Örnek: 689 Uğur Yıldırım";
    inp.classList.add("err");return;
  }

  // Ad soyad eşleşiyor mu?
  var kayitliAd=OGRENCILER[no];
  var mesafe=levenshtein(normalizeTR(girilenAd),normalizeTR(kayitliAd));

  if(mesafe===0){
    playerName=no+" "+kayitliAd;
    inp.classList.remove("err");err.textContent="";renderGameScreen();
  } else if(mesafe<=2){
    playerName=no+" "+kayitliAd;
    inp.classList.remove("err");
    err.style.color="#34d399";
    err.textContent=kayitliAd+" olarak kaydedildiniz.";
    setTimeout(function(){renderGameScreen();},1200);
  } else {
    err.style.color="#fca5a5";
    err.textContent="Numara ve isim eşleşmiyor. Örnek: 689 Uğur Yıldırım";
    inp.classList.add("err");
  }
}

// 2A esnek eşleştirme
function check2A(userVal, ekFiil, aciklama){
  var u=norm(userVal).trim();
  if(!u)return false;
  var ans=norm(ekFiil);
  // Tam eşleşme (tire ile veya tiresiz)
  if(u===ans||u===ans.replace(/^-/,""))return true;
  var aLow=norm(aciklama);
  // Hikaye / görülen geçmiş zaman
  var isHikaye=aLow.includes("hikayes")||aLow.includes("hikaye")||aLow.includes("gorulen")||aLow.includes("görülen");
  if(isHikaye){
    var hikayeKeys=["hikaye","hikâye","gorulen","görülen","gorulmus","görülmüş","gorulengecmis","görülengecmiş","görülen geçmiş","gorülen geçmiş zaman","görülen geçmis zaman"];
    if(hikayeKeys.some(function(k){return u===norm(k)||u.includes(norm(k));}))return true;
  }
  // Rivayet / duyulan geçmiş zaman
  var isRivayet=aLow.includes("rivayet")||aLow.includes("duyulan");
  if(isRivayet){
    var rivayetKeys=["rivayet","rivayeti","duyulan","duyulmus","duyulmuş","duyulan geçmiş","duyulan gecmis","duyulan geçmiş zaman","duyulan gecmis zaman"];
    if(rivayetKeys.some(function(k){return u===norm(k)||u.includes(norm(k));}))return true;
  }
  // Şart
  var isSart=aLow.includes("şart")||aLow.includes("sart");
  if(isSart){
    var sartKeys=["şart","sart","şarti","sarti","ek fiilin şart","ek fiilin sart","kosul","koşul"];
    if(sartKeys.some(function(k){return u===norm(k)||u.includes(norm(k));}))return true;
  }
  // Geniş zaman
  var isGenis=aLow.includes("geniş")||aLow.includes("genis");
  if(isGenis){
    var genisKeys=["geniş","genis","geniş zaman","genis zaman","ek fiilin geniş","ek fiilin genis","geniszaman"];
    if(genisKeys.some(function(k){return u===norm(k)||u.includes(norm(k));}))return true;
  }
  // Açıklamadaki parantez içi ek (örn. "(-du)")
  var parenMatch=aciklama.match(/\((-?[a-züğşıöçA-ZÜĞŞİÖÇ]+)\)$/);
  if(parenMatch){
    var parenEk=norm(parenMatch[1]);
    if(u===parenEk||u===parenEk.replace(/^-/,""))return true;
  }
  return false;
}

  var pf=document.createElement("div");pf.className="prog-fill";pf.id="prog3fill";pf.style.width=(total?Math.round(fc/total*100):0)+"%";

  var titLbl=document.createElement("div");

  var txtDiv=document.createElement("div");txtDiv.className="txtdisplay";

  tokens.forEach(function(tok){
    if(!tok)return;
    if(/^\s+$/.test(tok)){txtDiv.appendChild(document.createTextNode(" "));return;}
